apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
      - name: flask-app
        # הכתובת של ה-ECR שלך
        image: 639418629537.dkr.ecr.us-east-1.amazonaws.com/app-repo-new:latest
        ports:
        - containerPort: 3000 # וודא שזה הפורט שהאפליקציה שלך מאזינה לו
---
apiVersion: v1
kind: Service
metadata:
  name: flask-app-service
spec:
  type: LoadBalancer
  selector:
    app: flask-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000